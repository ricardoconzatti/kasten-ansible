- name: Send artifact + PDF to n8n
  hosts: kasten-lab
  run_once: true

  vars:
    url_webhook: "{{ n8n_webhook_email }}"
    file: "/tmp/artifact.json"
    pdf_url: "{{ minio_url }}/files-kasten-lab/lab-instructions.pdf"
    pdf_file: "/tmp/lab-instructions.pdf"

  tasks:

    - name: Read artifact JSON
      slurp:
        src: "{{ file }}"
      register: artifact_raw

    - name: Download PDF from MinIO (ignore SSL via curl)
      ansible.builtin.command: >
        curl -k -o {{ pdf_file }} {{ pdf_url }}

    - name: Read PDF as base64
      slurp:
        src: "{{ pdf_file }}"
      register: pdf_raw

    - name: Send to n8n webhook
      uri:
        url: "{{ url_webhook }}"
        method: POST
        body_format: json
        body:
          recipient_email: "{{ recipient_email }}"
          labid: "{{ labid }}"
          data: "{{ artifact_raw.content | b64decode | from_json }}"
          pdf:
            filename: "lab-instructions.pdf"
            content: "{{ pdf_raw.content }}"
        headers:
          Content-Type: "application/json"
