- name: Configure Headlamp Ingress
  hosts: kasten-lab
  become: yes

  vars:
    headlamp_host: "dashboard-{{ labid }}.{{ domain }}"
    use_artifact: "{{ use_artifact | default(false) }}"

  tasks:

    - name: Create Headlamp Ingress
      shell: |
        cat <<EOF | kubectl apply -f -
        apiVersion: networking.k8s.io/v1
        kind: Ingress
        metadata:
          name: headlamp-ingress
          namespace: headlamp
          annotations:
            traefik.ingress.kubernetes.io/router.entrypoints: web
        spec:
          ingressClassName: traefik
          rules:
          - host: {{ headlamp_host }}
            http:
              paths:
              - path: /
                pathType: Prefix
                backend:
                  service:
                    name: headlamp-dash
                    port:
                      number: 80
        EOF

    - name: Show Headlamp URL
      debug:
        msg: "Headlamp URL: https://{{ headlamp_host }}"

    - name: Log update (site)
      uri:
        url: "{{ site_webhook_logs }}"
        method: POST
        body_format: json
        body:
          lab_id: "{{ labid }}"
          message: "Dashboard ingress configured"
          detail: "https://{{ headlamp_host }}"
        headers:
          Content-Type: "application/json"
          x-webhook-secret: "{{ webhook_secret }}"
        validate_certs: no

    - name: Add Dashboard (ingress) to artifact
      include_role:
        name: artifact
      vars:
        artifact_section:
          dashboard:
            url: "https://{{ headlamp_host }}"
