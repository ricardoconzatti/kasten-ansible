- name: Configure Headlamp Ingress
  hosts: kasten-lab
  become: yes

  vars:
    headlamp_host: "dashboard-{{ labid }}.{{ domain }}"

  tasks:

    - name: Create Headlamp Ingress
      shell: |
        cat <<EOF | kubectl apply -f -
        apiVersion: networking.k8s.io/v1
        kind: Ingress
        metadata:
          name: headlamp-ingress
          namespace: headlamp
          annotations:
            traefik.ingress.kubernetes.io/router.entrypoints: web
        spec:
          ingressClassName: traefik
          rules:
          - host: {{ headlamp_host }}
            http:
              paths:
              - path: /
                pathType: Prefix
                backend:
                  service:
                    name: headlamp-dash
                    port:
                      number: 80
        EOF

    - name: Show Headlamp URL
      debug:
        msg: "Headlamp URL: https://{{ headlamp_host }}"
