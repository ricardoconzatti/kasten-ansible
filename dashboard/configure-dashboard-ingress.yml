- name: Install Headlamp
  hosts: kasten-lab
  become: yes

  vars:
    kubeconfig: /etc/rancher/k3s/k3s.yaml

  tasks:

    - name: Add Headlamp Helm repo
      shell: helm repo add headlamp https://kubernetes-sigs.github.io/headlamp/
      environment:
        KUBECONFIG: "{{ kubeconfig }}"
      ignore_errors: true

    - name: Update Helm repos
      shell: helm repo update
      environment:
        KUBECONFIG: "{{ kubeconfig }}"

    - name: Install Headlamp
      shell: |
        helm upgrade --install my-headlamp headlamp/headlamp \
          --namespace kube-system \
          --create-namespace
      environment:
        KUBECONFIG: "{{ kubeconfig }}"
