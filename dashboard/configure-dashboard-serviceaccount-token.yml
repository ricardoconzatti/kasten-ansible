- name: Create Dashboard ServiceAccount and Token
  hosts: kasten-lab
  become: yes
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml

  vars:
    sa_name: svc-dashboard-admin
    namespace: headlamp
    role_name: svc-dashboard-admin
    token_duration: 8h

  tasks:

    - name: Create ServiceAccount
      shell: kubectl -n {{ namespace }} create serviceaccount {{ sa_name }}
      ignore_errors: true

    - name: Create ClusterRoleBinding
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: rbac.authorization.k8s.io/v1
          kind: ClusterRoleBinding
          metadata:
            name: svc-dashboard-admin
          roleRef:
            apiGroup: rbac.authorization.k8s.io
            kind: ClusterRole
            name: cluster-admin
          subjects:
            - kind: ServiceAccount
              name: svc-dashboard-admin
              namespace: headlamp

    - name: Generate token
      shell: >
        kubectl -n {{ namespace }} create token {{ sa_name }} --duration={{ token_duration }}
      register: token_output

    - name: Show credentials
      debug:
        msg:
          - "Dashboard User: {{ sa_name }}"
          - "Token ---> {{ token_output.stdout }} <---"
