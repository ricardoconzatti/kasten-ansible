- name: Remove MinIO resources from artifact
  hosts: kasten-lab
  become: yes
  gather_facts: no

  vars:
    artifact_file: "{{ labdir }}/artifact.json"

    mc_path: "{{ labdir }}/mc"
    mc: "{{ mc_path }}"

    minio_alias: "minio"
    minio_access_key: "{{ minio_access_key }}"
    minio_secret_key: "{{ minio_secret_key }}"

  tasks:

    - name: Read artifact.json
      slurp:
        src: "{{ artifact_file }}"
      register: artifact_raw

    - name: Parse JSON
      set_fact:
        artifact: "{{ artifact_raw.content | b64decode | from_json }}"

    - name: Extract MinIO data
      set_fact:
        minio_bucket: "{{ artifact.minio.bucket }}"
        minio_user: "{{ artifact.minio.accessKey }}"

    - name: Configure MinIO alias
      shell: >
        {{ mc }} alias set {{ minio_alias }} {{ minio_url }}
        {{ minio_access_key }} {{ minio_secret_key }} --insecure
      changed_when: false

    - name: Remove MinIO bucket (force)
      shell: >
        {{ mc }} rb {{ minio_alias }}/{{ minio_bucket }} --force --insecure
      register: bucket_remove
      failed_when: false
      changed_when: "'Removed' in bucket_remove.stdout"

    - name: Remove MinIO user
      shell: >
        {{ mc }} admin user remove {{ minio_alias }} {{ minio_user }} --insecure
      register: user_remove
      failed_when: false
      changed_when: "'Removed' in user_remove.stdout"

    - name: Summary
      debug:
        msg: Bucket removed: {{ minio_bucket }} | User removed: {{ minio_user }}
