- name: Configure MinIO Bucket (for Kasten)
  hosts: kasten-lab
  gather_facts: no

  vars:
    use_artifact: "{{ use_artifact | default(false) }}"
    mc_path: "{{ labdir }}/mc"
    mc: "{{ mc_path }}"
    mc_download_url: "https://dl.min.io/client/mc/release/linux-amd64/mc"

    minio_alias: "minio"
    minio_access_key: "{{ minio_access_key }}"
    minio_secret_key: "{{ minio_secret_key }}"
    retention: "1d"
    retention_mode: "GOVERNANCE"
    
    bucket_name: "kasten-lab-{{ labid }}"
    region: "sp-conza-1"

    user_name: "kasten-lab-{{ labid }}"
    user_password: "K@sten{{ labid }}"

    policy_name: "kasten-lab-policy"
    policy_file: "{{ labdir }}/kasten-lab-policy.json"

  tasks:

    - name: Log update (site)
      uri:
        url: "{{ site_webhook_logs }}"
        method: POST
        body_format: json
        body:
          lab_id: "{{ labid }}"
          message: "🪣 Object Storage"
          source: "system"
        headers:
          Content-Type: "application/json"
        validate_certs: no

    - name: Download MinIO Client
      get_url:
        url: "{{ mc_download_url }}"
        dest: "{{ mc_path }}"
        mode: '0755'

    - name: Verify MinIO Client installation
      command: "{{ mc }} --version"
      register: mc_version
      changed_when: false

    - name: Show MinIO Client version
      debug:
        msg: "{{ mc_version.stdout }}"

    - name: Set MinIO alias
      shell: >
        {{ mc }} alias set {{ minio_alias }} {{ minio_url }}
        {{ minio_access_key }} {{ minio_secret_key }} --insecure
      register: alias_result
      changed_when: "'Added' in alias_result.stdout or 'Updated' in alias_result.stdout"

    - name: Set MinIO region
      shell: >
        {{ mc }} admin config set {{ minio_alias }} region name={{ region }} --insecure
      ignore_errors: true

    - name: Create bucket (with versioning + lock)
      shell: >
        {{ mc }} mb {{ minio_alias }}/{{ bucket_name }}
        --with-lock --with-versioning --region {{ region }} --insecure
      register: bucket_result
      failed_when: false
      changed_when: "'created' in bucket_result.stdout"

    - name: Create MinIO user
      shell: >
        {{ mc }} admin user add {{ minio_alias }} {{ user_name }} {{ user_password }} --insecure
      register: user_result
      failed_when: false
      changed_when: "'Added user' in user_result.stdout"

    - name: Create policy file inline
      copy:
        dest: "{{ policy_file }}"
        content: |
          {
            "Version": "2012-10-17",
            "Statement": [
              {
                "Effect": "Allow",
                "Action": ["s3:*"],
                "Resource": ["arn:aws:s3:::*"]
              }
            ]
          }

    - name: Log update (site)
      uri:
        url: "{{ site_webhook_logs }}"
        method: POST
        body_format: json
        body:
          lab_id: "{{ labid }}"
          message: "MinIO immutable bucket and user created"
          detail: "Bucket: {{ bucket_name }} | User: {{ user_name }}"
        headers:
          Content-Type: "application/json"
        validate_certs: no

    - name: Create policy
      shell: >
        {{ mc }} admin policy create {{ minio_alias }} {{ policy_name }} {{ policy_file }} --insecure
      register: policy_result
      failed_when: false
      changed_when: "'Created policy' in policy_result.stdout"

    - name: Attach policy to user
      shell: >
        {{ mc }} admin policy attach {{ minio_alias }} {{ policy_name }}
        --user {{ user_name }} --insecure
      register: attach_result
      failed_when: false

    - name: Set retention and retention mode
      shell: >
        {{ mc }} retention set --default {{ retention_mode }} {{ retention }}
        {{ minio_alias }}/{{ bucket_name }} --insecure
      register: retention_result
      failed_when: false

    - name: Debug output
      debug:
        msg:
          - "Bucket: {{ bucket_name }}"
          - "Endpoint: {{ minio_url }}"
          - "Region: {{ region }}"
          - "Access key: {{ user_name }}"
          - "Secret key: {{ user_password }}"

    - name: Log update (site)
      uri:
        url: "{{ site_webhook_logs }}"
        method: POST
        body_format: json
        body:
          lab_id: "{{ labid }}"
          message: "Retention policy configured"
          detail: "Retention: {{ retention_mode }} ({{ retention }})"
        headers:
          Content-Type: "application/json"
        validate_certs: no

    - name: Add MinIO to artifact
      include_role:
        name: artifact
      vars:
        artifact_section:
          minio:
            endpoint: "{{ minio_url }}"
            certificate: "skip"
            region: "{{ region }}"
            bucket: "{{ bucket_name }}"
            retention: "{{ retention }}"
            accessKey: "{{ user_name }}"
            secretKey: "{{ user_password }}"
