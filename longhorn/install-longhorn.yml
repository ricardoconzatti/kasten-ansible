- name: Install Longhorn
  hosts: kasten-lab
  become: yes

  vars:
    kubeconfig: "/etc/rancher/k3s/k3s.yaml"

  tasks:

    - name: Log update (site)
      uri:
        url: "{{ site_webhook_logs }}"
        method: POST
        body_format: json
        body:
          lab_id: "{{ labid }}"
          message: "Instaling Longhorn"
          detail: "Version: {{ longhorn_version }}"
        headers:
          Content-Type: "application/json"
        validate_certs: no

    - name: Add Longhorn repo
      shell: helm repo add longhorn https://charts.longhorn.io
      environment:
        KUBECONFIG: "{{ kubeconfig }}"

    - name: Update Helm repos
      shell: helm repo update
      environment:
        KUBECONFIG: "{{ kubeconfig }}"

    - name: Install Longhorn
      shell: >
        helm upgrade --install longhorn longhorn/longhorn
        --namespace longhorn-system
        --create-namespace
        --version "{{ longhorn_version }}"
      environment:
        KUBECONFIG: "{{ kubeconfig }}"

    - name: Wait for Longhorn pods to be ready
      shell: kubectl wait --for=condition=ready pod --all -n longhorn-system --timeout=600s
      environment:
        KUBECONFIG: "{{ kubeconfig }}"
