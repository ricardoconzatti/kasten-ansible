- name: Configure Kasten Ingress
  hosts: kasten-lab
  become: yes

  vars:
    kasten_host: "kasten-{{ labid }}.{{ domain }}"
    use_artifact: "{{ use_artifact | default(false) }}"

  tasks:

    - name: Create Kasten Ingress
      shell: |
        cat <<EOF | kubectl apply -f -
        apiVersion: networking.k8s.io/v1
        kind: Ingress
        metadata:
          name: kasten-traefik-ingress
          namespace: kasten-io
          annotations:
            traefik.ingress.kubernetes.io/router.entrypoints: web
        spec:
          ingressClassName: traefik
          rules:
          - host: {{ kasten_host }}
            http:
              paths:
              - path: /
                pathType: Prefix
                backend:
                  service:
                    name: gateway
                    port:
                      number: 80
        EOF

    - name: Show Kasten URL
      debug:
        msg: "Kasten URL: https://{{ kasten_host }}/k10/#"

    - name: Log update (site)
      uri:
        url: "{{ site_webhook_logs }}"
        method: POST
        body_format: json
        body:
          lab_id: "{{ labid }}"
          message: "Kasten ingress"
          detail: "https://{{ kasten_host }}/k10/#"
        headers:
          Content-Type: "application/json"
        validate_certs: no

    - name: Add Kasten (ingress) to artifact
      include_role:
        name: artifact
      vars:
        artifact_section:
          kasten:
            url: "https://{{ kasten_host }}/k10/#"
