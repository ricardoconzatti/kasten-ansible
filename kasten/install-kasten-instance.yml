- name: Install Veeam Kasten instance
  hosts: kasten-lab
  become: yes

  vars:
    kubeconfig: /etc/rancher/k3s/k3s.yaml
    use_artifact: "{{ use_artifact | default(false) }}"

  tasks:

    - name: Log update (site)
      uri:
        url: "{{ site_webhook_logs }}"
        method: POST
        body_format: json
        body:
          lab_id: "{{ labid }}"
          message: "🛡️ Data Protection"
          source: "system"
        headers:
          Content-Type: "application/json"
        validate_certs: no
  
    - name: Add Kasten Helm repo
      shell: helm repo add kasten https://charts.kasten.io/
      environment:
        KUBECONFIG: "{{ kubeconfig }}"
      ignore_errors: true

    - name: Update Helm repos
      shell: helm repo update
      environment:
        KUBECONFIG: "{{ kubeconfig }}"

    - name: Install or Upgrade Kasten
      shell: |
        helm upgrade --install k10 kasten/k10 \
          --version "{{ kasten_version }}" \
          --namespace kasten-io \
          --create-namespace \
          --set auth.tokenAuth.enabled=true \
          --set prometheus.server.persistentVolume.size=4Gi \
          --set global.persistence.size=8Gi \
          --set limiter.executorReplicas=1
      environment:
        KUBECONFIG: "{{ kubeconfig }}"

    - name: Get Kasten deployments
      shell: kubectl get deploy -n kasten-io -o name
      register: deployments
      environment:
        KUBECONFIG: "{{ kubeconfig }}"

    - name: Wait for each Kasten deployment
      shell: kubectl rollout status {{ item }} -n kasten-io --timeout=600s
      loop: "{{ deployments.stdout_lines }}"
      environment:
        KUBECONFIG: "{{ kubeconfig }}"

    - name: Get Kasten version
      shell: helm list -n kasten-io -o json
      register: helm_output
      environment:
        KUBECONFIG: "{{ kubeconfig }}"

    - name: Show Kasten version
      debug:
        msg: >
          Kasten version installed: {{
            (helm_output.stdout | from_json)[0].app_version
          }}

    - name: Log update (site)
      uri:
        url: "{{ site_webhook_logs }}"
        method: POST
        body_format: json
        body:
          lab_id: "{{ labid }}"
          message: "Kasten deployed"
          detail: "Version: {{ (helm_output.stdout | from_json)[0].app_version }}"
        headers:
          Content-Type: "application/json"
        validate_certs: no

    - name: Add Kasten (version) to artifact
      include_role:
        name: artifact
      vars:
        artifact_section:
          kasten:
            version: "{{ (helm_output.stdout | from_json)[0].app_version }}"
